# Phase 1 local stack: 2 services, database-per-service.
# Usage:
#   cp .env.example .env
#   docker compose up --build

services:
  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: auth
    ports:
      - "${AUTH_DB_PORT:-5432}:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d auth"]
      interval: 5s
      timeout: 3s
      retries: 10

  transaction-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: transactions
    ports:
      - "${TRANSACTION_DB_PORT:-5433}:5432"
    volumes:
      - transaction-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d transactions"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: auth-service
    environment:
      PORT: 3001
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: auth
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-me}
    ports:
      - "${AUTH_PORT:-3001}:3001"
    depends_on:
      auth-db:
        condition: service_healthy

  transaction-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: transaction-service
    environment:
      PORT: 3002
      DB_HOST: transaction-db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: transactions
      # MUST match auth-service so JWTs verify across the boundary.
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-me}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
    ports:
      - "${TRANSACTION_PORT:-3002}:3002"
    depends_on:
      transaction-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"      # AMQP
      - "${RABBITMQ_UI_PORT:-15672}:15672" # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: notification-service
    environment:
      PORT: 3003
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
    ports:
      - "${NOTIFICATION_PORT:-3003}:3003"
    depends_on:
      rabbitmq:
        condition: service_healthy

  import-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: import-worker
    environment:
      PORT: 3004
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      # Calls transaction-service's internal API to create each transaction.
      TRANSACTION_SERVICE_URL: http://transaction-service:3002
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-me}
    ports:
      - "${IMPORT_WORKER_PORT:-3004}:3004"
    depends_on:
      rabbitmq:
        condition: service_healthy

  report-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: report-service
    environment:
      PORT: 3005
      # Verifies the user's JWT, then reads transactions via the internal API.
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      TRANSACTION_SERVICE_URL: http://transaction-service:3002
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-me}
    ports:
      - "${REPORT_PORT:-3005}:3005"
    depends_on:
      - transaction-service

  group-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: groups
    ports:
      - "${GROUP_DB_PORT:-5435}:5432"
    volumes:
      - group-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d groups"]
      interval: 5s
      timeout: 3s
      retries: 10

  group-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: group-service
    environment:
      PORT: 3006
      DB_HOST: group-db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: groups
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      # Resolves members by email via auth-service's internal endpoint.
      AUTH_SERVICE_URL: http://auth-service:3001
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-change-me}
    ports:
      - "${GROUP_PORT:-3006}:3006"
    depends_on:
      group-db:
        condition: service_healthy
      auth-service:
        condition: service_started

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # Browser calls services directly, so these are host-visible URLs.
        NEXT_PUBLIC_AUTH_URL: http://localhost:${AUTH_PORT:-3001}
        NEXT_PUBLIC_TRANSACTION_URL: http://localhost:${TRANSACTION_PORT:-3002}
        NEXT_PUBLIC_REPORT_URL: http://localhost:${REPORT_PORT:-3005}
        NEXT_PUBLIC_GROUP_URL: http://localhost:${GROUP_PORT:-3006}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - auth-service
      - transaction-service
      - report-service
      - group-service

volumes:
  group-db-data:
  auth-db-data:
  transaction-db-data:
